<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Отчёт</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; max-width: 900px; margin: auto; }
    table { border-collapse: collapse; width: 100%; margin-bottom: 2rem; }
    th, td { border: 1px solid #ccc; padding: 8px 12px; text-align: left; }
    th { background: #f0f0f0; }
    h1 { color: #333; }
    h2 { color: #555; margin-top: 2rem; }
  </style>
</head>
<body>
  <h1>Отчёт по данным</h1>
  <p>Всего строк: <strong>50</strong></p>
  
  <h2>Числовые колонки</h2>
  <table>
    <thead>
      <tr><th>Колонка</th><th>Кол-во</th><th>Min</th><th>Max</th><th>Среднее</th></tr>
    </thead>
    <tbody>
  <tr>
    <td>Номер билета на экзамене</td>
    <td>50</td>
    <td>4.00</td>
    <td>100.00</td>
    <td>46.10</td>
  </tr>
  <tr>
    <td>Номер темы для подготовки</td>
    <td>50</td>
    <td>1.77</td>
    <td>9.82</td>
    <td>6.07</td>
  </tr>
  <tr>
    <td>Средняя оценка задач по теме</td>
    <td>50</td>
    <td>5.00</td>
    <td>100.00</td>
    <td>52.58</td>
  </tr></tbody>
  </table>
  
  <h2>Колонка: Сложность</h2>
  <table>
    <thead><tr><th>Значение</th><th>Кол-во</th></tr></thead>
    <tbody><tr><td>A</td><td>18</td></tr><tr><td>B</td><td>17</td></tr><tr><td>C</td><td>15</td></tr></tbody>
  </table>
</body>
</html>
